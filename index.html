<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">

  <a-camera position="0 1.2 2"></a-camera>

  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" position="2 4 2" intensity="1"></a-light>

  <a-entity id="container" position="0 1 -1.5" rotation="0 0 0">


    <a-entity
      id="model"
      gltf-model="switch.glb"
      scale="2 2 2"
      rotation="90 180 0">
    </a-entity>

  </a-entity>

</a-scene>

<script>
const container = document.querySelector('#container');

let isDragging = false;
let px = 0;
let py = 0;


function start(x, y){
  isDragging = true;
  px = x;
  py = y;
}

function move(x, y){
  if(!isDragging) return;

  let dx = x - px;
  let dy = y - py;

  px = x;
  py = y;

  let r = container.getAttribute('rotation');

  r.y += dx * 0.4;


  r.x -= dy * 0.2;
  r.x = Math.max(-20, Math.min(20, r.x));

  container.setAttribute('rotation', r);
}

function end(){
  isDragging = false;
}


document.addEventListener('mousedown', e => start(e.clientX, e.clientY));
document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
document.addEventListener('mouseup', end);

document.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
document.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
document.addEventListener('touchend', end);

</script>

</body>
</html>
