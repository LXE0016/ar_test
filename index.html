<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  vr-mode-ui="enabled: false"
  renderer="colorManagement: true;"
  xrweb="mode: ar"
>

  <a-camera position="0 1.6 0"></a-camera>

  <a-entity
    id="reticle"
    geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.07"
    material="color: green"
    rotation="-90 0 0"
    visible="false">
  </a-entity>

  <a-entity
    id="model"
    gltf-model="switch.glb"
    visible="false"
    scale="0.5 0.5 0.5"
    rotation="90 0 0">
  </a-entity>

  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 3 2" intensity="1"></a-light>

</a-scene>

<script>
const scene = document.querySelector('a-scene');
const reticle = document.querySelector('#reticle');
const model = document.querySelector('#model');

let hitTestSource = null;
let viewerSpace = null;
let refSpace = null;

scene.renderer.xr.addEventListener('sessionstart', async () => {
  const session = scene.renderer.xr.getSession();

  refSpace = await session.requestReferenceSpace('local');
  viewerSpace = await session.requestReferenceSpace('viewer');

  hitTestSource = await session.requestHitTestSource({
    space: viewerSpace
  });
});

scene.renderer.setAnimationLoop((timestamp, frame) => {
  if (!frame || !hitTestSource) return;

  const hitTestResults = frame.getHitTestResults(hitTestSource);

  if (hitTestResults.length > 0) {
    const hit = hitTestResults[0];
    const pose = hit.getPose(refSpace);

    reticle.setAttribute('visible', true);
    reticle.object3D.matrix.fromArray(pose.transform.matrix);
    reticle.object3D.matrix.decompose(
      reticle.object3D.position,
      reticle.object3D.quaternion,
      reticle.object3D.scale
    );
  }
});

window.addEventListener('click', () => {
  if (!reticle.getAttribute('visible')) return;

  model.setAttribute('visible', true);

  model.object3D.position.copy(reticle.object3D.position);
});
</script>

</body>
</html>
