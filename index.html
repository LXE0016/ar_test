<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://unpkg.com/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled: false">

    <a-marker preset="hiro">

      <a-entity
        id="model"
        gltf-model="switch.glb"
        position="0 0 0"
        rotation="0 180 0">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script id="autoscale-script">
    AFRAME.registerComponent('auto-scale', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;

          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          box.getSize(size);

          const maxDim = Math.max(size.x, size.y, size.z);

          const desiredSize = 0.5;

          const scale = desiredSize / maxDim;

          this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);

          const center = new THREE.Vector3();
          box.getCenter(center);
          mesh.position.sub(center);
        });
      }
    });

    document.querySelector('#model').setAttribute('auto-scale', '');
  </script>

</body>
</html>
