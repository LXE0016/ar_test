<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="2 4 2" intensity="1"></a-light>

    <a-camera position="0 1.2 0"></a-camera>

<a-entity id="container" position="0 0.6 -1.5">

  <a-entity
    id="model"
    gltf-model="switch.glb"
    scale="1 1 1"
    rotation="-90 0 0">
  </a-entity>

</a-entity>
  
  </a-scene>

 <script>
  const container = document.querySelector('#container');

  let isDragging = false;
  let previousX = 0;

  // 滑鼠
  document.addEventListener('mousedown', (e) => {
    isDragging = true;
    previousX = e.clientX;
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    let delta = e.clientX - previousX;
    previousX = e.clientX;

    let rotation = container.getAttribute('rotation');

    // 🔥 只轉 Y（左右）
    rotation.y += delta * 0.5;

    container.setAttribute('rotation', rotation);
  });

  // 手機
  document.addEventListener('touchstart', (e) => {
    isDragging = true;
    previousX = e.touches[0].clientX;
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
  });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;

    let delta = e.touches[0].clientX - previousX;
    previousX = e.touches[0].clientX;

    let rotation = container.getAttribute('rotation');

    // 🔥 只轉 Y（左右）
    rotation.y += delta * 0.5;

    container.setAttribute('rotation', rotation);
  });
</script>

</body>
</html>
