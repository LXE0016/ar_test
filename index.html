<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">


  <a-camera position="0 1.2 2" look-controls="enabled: false"></a-camera>


  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" position="2 4 2"></a-light>


  <a-entity id="rotator" position="0 1 0" rotation="0 0 0">

    <a-entity
      id="model"
      gltf-model="switch.glb"
      position="0 0 0"
      scale="2 2 2"
      rotation="90 180 0">
    </a-entity>

  </a-entity>

</a-scene>

<script>
const rotator = document.querySelector('#rotator');

let isDragging = false;
let startX = 0, startY = 0;

document.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener('mouseup', () => isDragging = false);

document.addEventListener('mousemove', e => {
  if (!isDragging) return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  startX = e.clientX;
  startY = e.clientY;

  let r = rotator.getAttribute('rotation');


  r.y += dx * 0.5;
  r.x -= dy * 0.3;


  r.x = Math.max(-30, Math.min(30, r.x));

  rotator.setAttribute('rotation', r);
});


document.addEventListener('touchstart', e => {
  isDragging = true;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener('touchend', () => isDragging = false);

document.addEventListener('touchmove', e => {
  if (!isDragging) return;

  const dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

  let r = rotator.getAttribute('rotation');

  r.y += dx * 0.5;
  r.x -= dy * 0.3;

  r.x = Math.max(-30, Math.min(30, r.x));

  rotator.setAttribute('rotation', r);
});
</script>

</body>
</html>
