<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    #btnAR{
      position: fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 20px;
      background:black;
      color:white;
      border:none;
      border-radius:8px;
      z-index:999;
    }
  </style>
</head>

<body style="margin:0; overflow:hidden;">

<button id="btnAR">進入 AR</button>

<a-scene 
  id="normalScene"
  background="color: #ECECEC" 
  vr-mode-ui="enabled: false"
  environment="preset: city"
>

  <a-camera 
    position="0 1.0 1.4"
    rotation="-10 0 0"
    look-controls="enabled: false">
  </a-camera>

  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" position="2 4 3" intensity="1.2"></a-light>
  <a-light type="directional" position="-3 2 1" intensity="0.8"></a-light>
  <a-light type="directional" position="0 3 -3" intensity="1"></a-light>

  <a-entity id="rotator" position="0 0.7 0" scale="3 3 3">
    <a-entity gltf-model="switch.glb" rotation="90 0 0"></a-entity>
  </a-entity>

</a-scene>

<a-scene 
  id="arScene"
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; debugUIEnabled: false;"
  style="display:none;"
>

  <a-camera look-controls="enabled:false"></a-camera>

  <a-entity
    gltf-model="switch.glb"
    position="0 0 -1.5"
    scale="1 1 1"
    rotation="90 0 0">
  </a-entity>

  <a-light type="ambient" intensity="0.9"></a-light>
  <a-light type="directional" position="1 2 1" intensity="1"></a-light>

</a-scene>

<script>

const btn = document.getElementById('btnAR');
const normalScene = document.getElementById('normalScene');
const arScene = document.getElementById('arScene');

btn.addEventListener('click', () => {

  try{
    normalScene.style.display = 'none';
    arScene.style.display = 'block';

    btn.innerText = '返回展示';

    btn.onclick = () => {
      arScene.style.display = 'none';
      normalScene.style.display = 'block';
      btn.innerText = '進入 AR';
      location.reload();
    }

  }catch(e){
    alert('此裝置不支援 AR');
  }

});

</script>

</body>
</html>
