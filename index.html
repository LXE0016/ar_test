<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">

  <a-camera 
    id="cam"
    position="0 1.2 1.8"
    rotation="-15 0 0"
    look-controls="enabled: false">
  </a-camera>

  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" position="2 4 2"></a-light>

  <a-entity id="rotator" position="0 0.7 0">

    <a-entity
      id="model"
      gltf-model="switch.glb"
      scale="3 3 3"
      rotation="90 180 180">
    </a-entity>

  </a-entity>

</a-scene>

<script>
const rotator = document.querySelector('#rotator');
const cam = document.querySelector('#cam');

let isDragging = false;
let startX = 0;
let startY = 0;

document.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }
});

document.addEventListener('touchend', () => isDragging = false);

document.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {

    let dx = e.touches[0].clientX - startX;
    let dy = e.touches[0].clientY - startY;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    let r = rotator.getAttribute('rotation');

    r.y += dx * 0.5;
    r.x -= dy * 0.3;
    r.x = Math.max(-30, Math.min(30, r.x));

    rotator.setAttribute('rotation', r);
  }
});

let startDist = 0;

document.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (startDist === 0) {
      startDist = dist;
      return;
    }

    let delta = dist - startDist;
    startDist = dist;

    let pos = cam.getAttribute('position');

    pos.z -= delta * 0.01;

    pos.z = Math.max(1, Math.min(4, pos.z));

    cam.setAttribute('position', pos);
  }
});

document.addEventListener('touchend', () => {
  startDist = 0;
});
</script>

</body>
</html>
