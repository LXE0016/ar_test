<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="2 4 2" intensity="1"></a-light>

    <a-camera position="0 1.2 0"></a-camera>

<a-entity id="container" position="0 0.6 -1.5" rotation="0 0 0">

  <a-entity id="pivot" position="0 -0.3 0">

    <a-entity
      id="model"
      gltf-model="switch.glb"
      scale="1 1 1"
      rotation="90 180 0">
    </a-entity>

  </a-entity>

</a-entity>
  
  </a-scene>

<script>
const container = document.querySelector('#container');

let isDragging = false;
let px = 0, py = 0;

document.addEventListener('touchstart', e => {
  isDragging = true;
  px = e.touches[0].clientX;
  py = e.touches[0].clientY;
});

document.addEventListener('touchend', () => {
  isDragging = false;
});

document.addEventListener('touchmove', e => {
  if (!isDragging) return;

  let dx = e.touches[0].clientX - px;
  let dy = e.touches[0].clientY - py;

  px = e.touches[0].clientX;
  py = e.touches[0].clientY;

  let r = container.getAttribute('rotation');

  r.y += dx * 0.5;
  r.x -= dy * 0.3;

  r.x = Math.max(-30, Math.min(30, r.x));

  container.setAttribute('rotation', r);
});
</script>
  
</body>
</html>
