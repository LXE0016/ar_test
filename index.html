<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">

  <a-camera position="0 1.2 1.5"></a-camera>

  <a-light type="ambient" intensity="2"></a-light>
  <a-light type="directional" position="1 3 2" intensity="2"></a-light>

  <a-entity
    id="model"
    gltf-model="switch.glb"
    position="0 1 -1"
    scale="3 3 3"
    rotation="0 180 0">
  </a-entity>

</a-scene>

<script>
const container = document.querySelector('#container');
const pivot = document.querySelector('#pivot');
const model = document.querySelector('#model');


model.addEventListener('model-loaded', () => {
  const mesh = model.getObject3D('mesh');
  const box = new THREE.Box3().setFromObject(mesh);
  const center = box.getCenter(new THREE.Vector3());

  pivot.object3D.position.set(-center.x, -center.y, -center.z);
});


let isDragging = false;
let px = 0, py = 0;

document.addEventListener('touchstart', e => {
  isDragging = true;
  px = e.touches[0].clientX;
  py = e.touches[0].clientY;
});

document.addEventListener('touchend', () => {
  isDragging = false;
});

document.addEventListener('touchmove', e => {
  if (!isDragging) return;

  let dx = e.touches[0].clientX - px;
  let dy = e.touches[0].clientY - py;

  px = e.touches[0].clientX;
  py = e.touches[0].clientY;

  let r = container.getAttribute('rotation');

  r.y += dx * 0.5;
  r.x -= dy * 0.3;

  r.x = Math.max(-30, Math.min(30, r.x));

  container.setAttribute('rotation', r);
});
</script>

</body>
</html>
