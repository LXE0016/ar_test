<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene
    background="color: #ECECEC"
    vr-mode-ui="enabled: false"
  >

    <!-- 燈光 -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="2 4 2" intensity="1"></a-light>

    <!-- 相機 -->
    <a-camera position="0 1.2 3"></a-camera>

    <!-- 模型 -->
    <a-entity
      id="model"
      gltf-model="switch.glb"
      position="0 0 0"
      scale="1 1 1"
      rotation="0 180 0">
    </a-entity>

  </a-scene>

  <script>
    // 👉 旋轉控制（滑動）
    let model = document.querySelector('#model');
    let isDragging = false;
    let previousX;

    document.addEventListener('mousedown', (e) => {
      isDragging = true;
      previousX = e.clientX;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      let delta = e.clientX - previousX;
      previousX = e.clientX;

      let rotation = model.getAttribute('rotation');
      rotation.y += delta * 0.5;
      model.setAttribute('rotation', rotation);
    });

    // 👉 手機觸控
    document.addEventListener('touchstart', (e) => {
      isDragging = true;
      previousX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      let delta = e.touches[0].clientX - previousX;
      previousX = e.touches[0].clientX;

      let rotation = model.getAttribute('rotation');
      rotation.y += delta * 0.5;
      model.setAttribute('rotation', rotation);
    });
  </script>

</body>
</html>
