<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene background="color: #ECECEC" vr-mode-ui="enabled: false">

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="2 4 2" intensity="1"></a-light>

    <a-camera position="0 1 1.5"></a-camera>

<a-entity id="container" position="0 0.6 -1.5">

  <a-entity
    id="model"
    gltf-model="switch.glb"
    scale="1 1 1"
    rotation="-90 180 0">
  </a-entity>

</a-entity>
  
  </a-scene>

  <script>
    const model = document.querySelector('#model');

    let isDragging = false;
    let previousX = 0;
    let scale = 2;

    document.addEventListener('mousedown', (e) => {
      isDragging = true;
      previousX = e.clientX;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      let delta = e.clientX - previousX;
      previousX = e.clientX;

      let rotation = model.getAttribute('rotation');
      rotation.y += delta * 0.5;
      model.setAttribute('rotation', rotation);
    });

    document.addEventListener('touchstart', (e) => {
      isDragging = true;
      previousX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      let delta = e.touches[0].clientX - previousX;
      previousX = e.touches[0].clientX;

      let rotation = model.getAttribute('rotation');
      rotation.y += delta * 0.5;
      model.setAttribute('rotation', rotation);
    });

    document.addEventListener('wheel', (e) => {
      scale += e.deltaY * -0.001;
      scale = Math.min(Math.max(0.5, scale), 5);
      model.setAttribute('scale', `${scale} ${scale} ${scale}`);
    });

    let initialDistance = null;

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (!initialDistance) {
          initialDistance = distance;
        } else {
          let diff = distance - initialDistance;
          scale += diff * 0.005;
          scale = Math.min(Math.max(0.5, scale), 5);
          model.setAttribute('scale', `${scale} ${scale} ${scale}`);
          initialDistance = distance;
        }
      }
    });

    document.addEventListener('touchend', () => {
      initialDistance = null;
    });
  </script>

</body>
</html>
