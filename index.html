<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene 
  background="color: #ECECEC" 
  vr-mode-ui="enabled: false"
  environment="preset: city"
>

  <a-camera 
    id="cam"
    position="0 1.0 1.4"
    rotation="-10 0 0"
    look-controls="enabled: false">
  </a-camera>

  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" position="2 4 3" intensity="1.2"></a-light>
  <a-light type="directional" position="-3 2 1" intensity="0.8"></a-light>
  <a-light type="directional" position="0 3 -3" intensity="1"></a-light>

  <a-entity id="rotator" position="0 0.7 0" rotation="0 0 0" scale="3 3 3">

    <a-entity
      id="model"
      gltf-model="switch.glb"
      rotation="90 0 0">
    </a-entity>

  </a-entity>

</a-scene>

<script>

  const model = document.querySelector('#model');

model.addEventListener('model-loaded', () => {
  const mesh = model.getObject3D('mesh');
  const box = new THREE.Box3().setFromObject(mesh);
  const size = box.getSize(new THREE.Vector3());


  const maxDim = Math.max(size.x, size.y, size.z);

  let autoScale = 2.5 / maxDim;

  autoScale = Math.max(1.5, Math.min(4, autoScale));

  rotator.setAttribute('scale', `${autoScale} ${autoScale} ${autoScale}`);
  scale = autoScale; 
});
  
const rotator = document.querySelector('#rotator');

const defaultRotation = {x:0, y:0, z:0};
let scale = 3;

let isDragging = false;
let px = 0, py = 0;

function start(x,y){
  isDragging = true;
  px = x;
  py = y;
}

let velocityX = 0;
let velocityY = 0;

function move(x,y){
  if(!isDragging) return;

  let dx = x - px;
  let dy = y - py;

  px = x;
  py = y;

  velocityX = dx * 0.1;
  velocityY = dy * 0.1;

  let r = rotator.getAttribute('rotation');

  r.y += dx * 0.5;
  r.x -= dy * 0.3;
  r.x = Math.max(-30, Math.min(30, r.x));

  rotator.setAttribute('rotation', r);
}

function end(){
  isDragging = false;
}

document.addEventListener('mousedown', e => start(e.clientX, e.clientY));
document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
document.addEventListener('mouseup', end);

document.addEventListener('touchstart', e => {
  if(e.touches.length === 1){
    start(e.touches[0].clientX, e.touches[0].clientY);
  }
});
document.addEventListener('touchmove', e => {
  if(e.touches.length === 1){
    move(e.touches[0].clientX, e.touches[0].clientY);
  }
});
document.addEventListener('touchend', end);



document.addEventListener('wheel', e => {
  scale -= e.deltaY * 0.002;
  scale = Math.max(1, Math.min(6, scale));

  rotator.setAttribute('scale', `${scale} ${scale} ${scale}`);
});

let startDist = 0;

document.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (startDist === 0) {
      startDist = dist;
      return;
    }

    let delta = dist - startDist;
    startDist = dist;

    scale += delta * 0.01;
    scale = Math.max(1, Math.min(6, scale));

    rotator.setAttribute('scale', `${scale} ${scale} ${scale}`);
  }
});

document.addEventListener('touchend', () => {
  startDist = 0;
});

document.addEventListener('dblclick', () => {
  rotator.setAttribute('rotation', defaultRotation);
  rotator.setAttribute('scale', '3 3 3');
  scale = 3;
});

  function animate(){
  if(!isDragging){

    let r = rotator.getAttribute('rotation');

    r.y += velocityX;
    r.x -= velocityY;

    r.x = Math.max(-30, Math.min(30, r.x));

    rotator.setAttribute('rotation', r);

    velocityX *= 0.95;
    velocityY *= 0.95;
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
